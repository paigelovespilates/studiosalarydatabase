<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Advance Flow</title>
<style>
body{font-family:sans-serif;padding:40px}
.step{display:none;margin-bottom:20px}
.step.active{display:block}
input,select{padding:10px;margin-top:10px;width:100%}
</style>
</head>
<body>

<div id="step1" class="step active">
  <h3>Where are you based?</h3>
  <select id="country">
    <option value="">Select country</option>
    <option value="US">United States</option>
    <option value="CA">Canada</option>
  </select>
  <input id="zip" placeholder="Zip / Postal Code">
</div>

<div id="step2" class="step">
  <h3>Distance</h3>
  <input type="range" id="radius" min="5" max="100" value="25">
</div>

<div id="step3" class="step">
  <h3>Formats</h3>
  <label><input type="checkbox" value="Mat"> Mat</label>
  <label><input type="checkbox" value="Reformer"> Reformer</label>
</div>

<div id="step4" class="step">
  <h3>Alerts</h3>
  <label><input type="radio" name="alerts" value="yes"> Yes</label>
  <label><input type="radio" name="alerts" value="no"> No</label>
</div>

<script>
function next(current, next){
  document.getElementById(current).classList.remove('active');
  document.getElementById(next).classList.add('active');
}

// STEP 1 AUTO ADVANCE
const country = document.getElementById('country');
const zip = document.getElementById('zip');

function checkStep1(){
  if(country.value && zip.value.trim().length > 2){
    next('step1','step2');
  }
}

country.addEventListener('change', checkStep1);
zip.addEventListener('input', checkStep1);

// STEP 2 AUTO ADVANCE
const radius = document.getElementById('radius');
radius.addEventListener('change', ()=>{
  next('step2','step3');
});

// STEP 3 AUTO ADVANCE
const formats = document.querySelectorAll('#step3 input[type="checkbox"]');
formats.forEach(cb=>{
  cb.addEventListener('change', ()=>{
    if(document.querySelectorAll('#step3 input:checked').length > 0){
      next('step3','step4');
    }
  });
});

// STEP 4 FINAL
const alerts = document.querySelectorAll('input[name="alerts"]');
alerts.forEach(r=>{
  r.addEventListener('change', ()=>{
    alert('Flow complete — ready to submit');
  });
});
</script>

</body>
</html>
