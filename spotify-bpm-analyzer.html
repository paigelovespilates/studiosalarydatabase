<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playlist Playbook</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --olive: #373930; --linen: #EDEBE4; --linen-dark: #E0DDD5; --cream: #F7F5EF;
    --terracotta: #B85C3C; --sage: #7A8C6E; --text: #2A2B26; --muted: #8A8A7A;
    --border: #D4D1C7; --spotify: #1DB954; --gold: #C9A84C;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }
  header { background: var(--olive); color: var(--linen); padding: 18px 36px; display: flex; align-items: baseline; justify-content: space-between; }
  header h1 { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 600; }
  header span { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--sage); }
  .container { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }
  .tab-bar { display: flex; margin-bottom: 24px; border-bottom: 2px solid var(--border); }
  .tab { padding: 9px 22px; cursor: pointer; font-size: 11px; font-weight: 500; font-family: 'DM Mono', monospace; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: color 0.15s, border-color 0.15s; }
  .tab.active { color: var(--olive); border-bottom-color: var(--terracotta); }
  /* AUTH */
  #auth-section { text-align: center; padding: 70px 40px; }
  #auth-section h2 { font-family: 'Cormorant Garamond', serif; font-size: 34px; font-weight: 400; font-style: italic; margin-bottom: 10px; }
  #auth-section p { color: var(--muted); font-size: 14px; margin-bottom: 32px; line-height: 1.6; }
  .btn-spotify { display: inline-flex; align-items: center; gap: 10px; background: var(--spotify); color: white; border: none; padding: 13px 30px; border-radius: 40px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
  .btn-spotify:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(29,185,84,0.3); }
  /* USER BAR */
  .user-bar { display: flex; align-items: center; justify-content: space-between; background: var(--olive); color: var(--linen); padding: 9px 18px; border-radius: 7px; margin-bottom: 20px; font-size: 13px; }
  .user-bar button { background: none; border: 1px solid rgba(237,235,228,0.3); color: var(--linen); padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-family: 'DM Sans', sans-serif; }
  /* PLAYLIST GRID */
  .section-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .playlist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 9px; margin-bottom: 24px; }
  .playlist-card { background: white; border: 1.5px solid var(--border); border-radius: 7px; padding: 11px; cursor: pointer; transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s; position: relative; }
  .playlist-card:hover { border-color: var(--olive); transform: translateY(-2px); box-shadow: 0 4px 14px rgba(55,57,48,0.1); }
  .playlist-card.active { border-color: var(--terracotta); background: #FDF6F3; }
  .playlist-card img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 4px; margin-bottom: 7px; background: var(--linen-dark); }
  .playlist-card .pname { font-size: 11px; font-weight: 600; line-height: 1.3; margin-bottom: 2px; }
  .playlist-card .pmeta { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .placeholder-img { width: 100%; aspect-ratio: 1; background: var(--linen-dark); border-radius: 4px; margin-bottom: 7px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
  /* PANELS */
  .panel { background: white; border: 1.5px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 24px; }
  .panel-header { background: var(--olive); color: var(--linen); padding: 16px 22px; display: flex; align-items: center; justify-content: space-between; }
  .panel-header h3 { font-family: 'Cormorant Garamond', serif; font-size: 19px; font-weight: 600; font-style: italic; }
  .panel-header .meta { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--sage); letter-spacing: 1.5px; }
  /* CHART */
  .chart-area { padding: 20px 22px; border-bottom: 1px solid var(--border); }
  .chart-area h4 { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
  .chart-wrap { position: relative; height: 220px; }
  /* PLAYBOOK TABLE */
  .table-wrap { padding: 0 22px 22px; }
  .table-wrap h4 { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin: 18px 0 10px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { text-align: left; padding: 6px 9px; font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); border-bottom: 1.5px solid var(--border); }
  td { padding: 8px 9px; border-bottom: 1px solid var(--linen-dark); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--cream); }
  .mono { font-family: 'DM Mono', monospace; font-size: 11px; }
  .muted { color: var(--muted); }
  .key-badge { display: inline-block; padding: 2px 6px; border-radius: 3px; font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; }
  .key-major { background: #EEF3EB; color: var(--sage); }
  .key-minor { background: #F3EDEB; color: var(--terracotta); }
  .energy-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; }
  .bpm-bar { height: 4px; border-radius: 2px; background: var(--terracotta); opacity: 0.6; display: inline-block; }
  /* MATCH SCORES */
  .match-score { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 50%; font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; }
  .match-great { background: #EEF3EB; color: var(--sage); border: 1.5px solid var(--sage); }
  .match-good { background: #F5F2E8; color: var(--gold); border: 1.5px solid var(--gold); }
  .match-ok { background: #F7F5EF; color: var(--muted); border: 1.5px solid var(--border); }
  /* MATCHER PANEL */
  .matcher-controls { padding: 16px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .matcher-controls label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
  .matcher-controls select { padding: 6px 10px; border: 1.5px solid var(--border); border-radius: 5px; font-family: 'DM Sans', sans-serif; font-size: 13px; background: white; cursor: pointer; }
  .matcher-controls select:focus { outline: none; border-color: var(--olive); }
  /* LIKED SONGS TABLE */
  .match-row { display: grid; grid-template-columns: 1fr 80px 80px 80px 60px 50px; gap: 0; border-bottom: 1px solid var(--linen-dark); align-items: center; }
  .match-row:hover { background: var(--cream); }
  .match-row:last-child { border-bottom: none; }
  .match-row > div { padding: 9px 9px; }
  .match-header { display: grid; grid-template-columns: 1fr 80px 80px 80px 60px 50px; border-bottom: 1.5px solid var(--border); background: var(--linen); }
  .match-header > div { padding: 7px 9px; font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
  /* EXPORT */
  .export-bar { padding: 12px 22px; background: var(--linen); display: flex; gap: 9px; border-top: 1px solid var(--border); }
  .btn { padding: 7px 16px; border-radius: 5px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; border: none; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.8; }
  .btn-primary { background: var(--olive); color: var(--linen); }
  .btn-outline { background: white; color: var(--text); border: 1.5px solid var(--border); }
  /* LOADING */
  .loading { display: flex; align-items: center; gap: 9px; color: var(--muted); font-size: 12px; padding: 14px 0; }
  .spinner { width: 15px; height: 15px; border: 2px solid var(--border); border-top-color: var(--olive); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { background: #FDF0ED; border: 1px solid #E8B4A0; color: var(--terracotta); padding: 9px 13px; border-radius: 5px; font-size: 12px; margin: 8px 0; }
  .empty-msg { color: var(--muted); font-size: 13px; padding: 24px; text-align: center; font-style: italic; }
  /* PLAYBOOK SUMMARY CARDS */
  .pos-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; padding: 20px 22px; }
  .pos-card { border: 1.5px solid var(--border); border-radius: 8px; padding: 14px; background: var(--cream); }
  .pos-card-num { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600; color: var(--olive); line-height: 1; margin-bottom: 6px; }
  .pos-card-bpm { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; margin-bottom: 4px; }
  .pos-card-range { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-bottom: 6px; }
  .pos-card-examples { font-size: 11px; color: var(--muted); line-height: 1.5; font-style: italic; }
</style>
</head>

// ── AUTH ──────────────────────────────────────────────────────────────
function generateCodeVerifier() {
  const a=new Uint8Array(32); crypto.getRandomValues(a);
  return btoa(String.fromCharCode(...a)).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
}
async function generateCodeChallenge(v) {
  const d=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v));
  return btoa(String.fromCharCode(...new Uint8Array(d))).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
}
async function login() {
  const v=generateCodeVerifier(); localStorage.setItem('pkce_verifier',v);
  const c=await generateCodeChallenge(v);
  const p=new URLSearchParams({client_id:CLIENT_ID,response_type:'code',redirect_uri:REDIRECT_URI,scope:SCOPES,code_challenge_method:'S256',code_challenge:c});
  window.location.href='https://accounts.spotify.com/authorize?'+p;
}
async function handleCallback(code) {
  const v=localStorage.getItem('pkce_verifier');
  const body=new URLSearchParams({grant_type:'authorization_code',code,redirect_uri:REDIRECT_URI,client_id:CLIENT_ID,code_verifier:v});
  const res=await fetch('https://accounts.spotify.com/api/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
  const data=await res.json();
  if(data.access_token){
    accessToken=data.access_token;
    localStorage.setItem('spotify_token',accessToken);
    localStorage.setItem('spotify_token_expiry',Date.now()+data.expires_in*1000);
    window.history.replaceState({},document.title,window.location.pathname);
    initApp();
  }
}
function logout(){
  ['spotify_token','spotify_token_expiry','pkce_verifier'].forEach(k=>localStorage.removeItem(k));
  accessToken=null;
  document.getElementById('auth-section').style.display='block';
  document.getElementById('app-section').style.display='none';
}
function isTokenValid(){const e=localStorage.getItem('spotify_token_expiry');return e&&Date.now()<+e;}

// ── SPOTIFY API ───────────────────────────────────────────────────────
async function spotifyFetch(endpoint){
  const url=endpoint.startsWith('http')?endpoint:'https://api.spotify.com/v1'+endpoint;
  const res=await fetch(url,{headers:{'Authorization':'Bearer '+accessToken}});
  if(!res.ok) throw new Error('Spotify API error '+res.status);
  return res.json();
}
async function fetchAllTracks(playlistId){
  let tracks=[],url=`/playlists/${playlistId}/tracks?limit=100&fields=next,items(track(id,name,artists,duration_ms))`;
  while(url){const data=await spotifyFetch(url);tracks=tracks.concat((data.items||[]).filter(i=>i.track&&i.track.id));url=data.next||null;}
  return tracks;
}
async function fetchAudioFeatures(ids){
  let features=[];
  for(let i=0;i<ids.length;i+=100){
    const data=await spotifyFetch(`/audio-features?ids=${ids.slice(i,i+100).join(',')}`);
    features=features.concat(data.audio_features||[]);
  }
  return features;
}

function filterMatcherByPosition(){

function scoreTrackForPosition(track, pos){
  if(!track.hasBpm) return null;
  // BPM score: within range = 100, ±10 = 80, ±20 = 60, else proportional
  const bpmDiff=Math.abs(track.bpm-pos.avgBpm);
  const bpmScore=bpmDiff<=5?100:bpmDiff<=15?85:bpmDiff<=25?65:bpmDiff<=40?45:20;
  // Key/mode score
  const keyScore=track.keyFull===pos.commonKey?100:track.mode===pos.commonMode?60:30;
  // Energy score
  const energyDiff=track.energy!=null?Math.abs(track.energy-pos.avgEnergy):20;
  const energyScore=energyDiff<=10?100:energyDiff<=20?75:energyDiff<=35?50:25;
  // Weighted
  return Math.round(bpmScore*0.5+keyScore*0.3+energyScore*0.2);
}

function bestPositionForTrack(track){
  if(!track.hasBpm) return null;
  let best=null,bestScore=0;
  PLAYBOOK.forEach(pos=>{
    const s=scoreTrackForPosition(track,pos);
    if(s>bestScore){bestScore=s;best={position:pos.position,score:s};}
  });
  return best;
}

function renderMatcherRows(){
  const rows=document.getElementById('matcher-rows');
  if(!rows)return;

  let tracks=[...likedTracks];

  // If filtering by position, score and sort by that position
  if(selectedPosition!=='all'){
    const pos=PLAYBOOK.find(p=>p.position===parseInt(selectedPosition));
    if(pos){
      tracks=tracks.map(t=>({...t,posScore:scoreTrackForPosition(t,pos),bestPos:bestPositionForTrack(t)}))
                   .sort((a,b)=>(b.posScore||0)-(a.posScore||0));
    }
  } else {
    tracks=tracks.map(t=>({...t,bestPos:bestPositionForTrack(t)}));
  }

  if(!tracks.length){rows.innerHTML='<div class="empty-msg">No tracks loaded</div>';return;}

  const hasBpmData=tracks.some(t=>t.hasBpm);

  rows.innerHTML=tracks.map(t=>{
    const modeClass=t.mode==='maj'?'key-major':'key-minor';
    const ec=t.energy>70?'#B85C3C':t.energy>40?'#7A8C6E':'#D4D1C7';

    let scoreEl='<span class="mono muted" style="font-size:10px">—</span>';
    let bestFitEl='<span class="mono muted" style="font-size:10px">—</span>';

    if(t.hasBpm){
      const displayScore=selectedPosition!=='all'?t.posScore:t.bestPos?.score;
      const scoreClass=displayScore>=80?'match-great':displayScore>=60?'match-good':'match-ok';
      scoreEl=`<span class="match-score ${scoreClass}">${displayScore||'—'}</span>`;
      if(t.bestPos){
        bestFitEl=`<span class="mono" style="font-size:11px;color:var(--olive)">#${t.bestPos.position}</span>`;
      }
    }

    return `<div class="match-row">
      <div>
        <div style="font-size:12px;font-weight:500">${t.name}</div>
        <div style="font-size:11px;color:var(--muted)">${t.artist}</div>
      </div>
      <div class="mono">${t.bpm||'—'}</div>
      <div>${t.hasBpm?`<span class="key-badge ${modeClass}">${t.keyFull}</span>`:'<span class="mono muted" style="font-size:10px">—</span>'}</div>
      <div>${t.energy!=null?`<span class="energy-dot" style="background:${ec}"></span><span class="mono muted">${t.energy}%</span>`:'<span class="mono muted" style="font-size:10px">—</span>'}</div>
      <div>${bestFitEl}</div>
      <div>${scoreEl}</div>
    </div>`;
  }).join('');

  if(!hasBpmData){
    rows.innerHTML='<div class="empty-msg">BPM data not available for this playlist via Spotify API.<br>Use the Liked Songs playlist or try another playlist.</div>';
  }
}

      ]
    },
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{labels:{font:{family:'DM Mono',size:10},color:'#8A8A7A',usePointStyle:true}},
        tooltip:{callbacks:{title:items=>`#${tracks[items[0].dataIndex].position}: ${tracks[items[0].dataIndex].name}`}}},
      scales:{x:{grid:{color:'#EDEBE4'},ticks:{font:{family:'DM Mono',size:9},color:'#8A8A7A'}},
        y:{grid:{color:'#EDEBE4'},ticks:{font:{family:'DM Mono',size:10},color:'#8A8A7A'},title:{display:true,text:'BPM',font:{family:'DM Mono',size:9},color:'#8A8A7A'}}}}
  });
  // Table
  document.getElementById('single-tbody').innerHTML=tracks.map(t=>{
    const modeClass=t.mode==='maj'?'key-major':'key-minor';
    const ec=t.energy>70?'#B85C3C':t.energy>40?'#7A8C6E':'#D4D1C7';
    const best=bestPositionForTrack(t);
    const pbPos=PLAYBOOK.find(p=>p.position===t.position);
    const bpmDiff=pbPos?t.bpm-pbPos.avgBpm:null;
    const diffStr=bpmDiff!=null?(bpmDiff>0?`+${bpmDiff}`:`${bpmDiff}`):'';
    const diffColor=Math.abs(bpmDiff)<10?'var(--sage)':Math.abs(bpmDiff)<20?'var(--gold)':'var(--terracotta)';
    return `<tr>
      <td class="mono muted">${t.position}</td>
      <td style="font-size:12px">${t.name}</td>
      <td class="muted" style="font-size:11px">${t.artist}</td>
      <td class="mono">${t.bpm} ${bpmDiff!=null?`<span style="font-size:10px;color:${diffColor}">${diffStr}</span>`:''}</td>
      <td><span class="key-badge ${modeClass}">${t.keyFull}</span></td>
      <td><span class="energy-dot" style="background:${ec}"></span><span class="mono muted">${t.energy}%</span></td>
      <td class="mono" style="color:var(--olive)">${best?`#${best.position} (${best.score}%)`:'—'}</td>
    </tr>`;
  }).join('');
}

function exportSingleCSV(){
  if(!singleTracks.length)return;
  const rows=[['Position','Track','Artist','BPM','Key','Mode','Energy%','Best Fit Position']];
  singleTracks.forEach(t=>{const b=bestPositionForTrack(t);rows.push([t.position,`"${t.name}"`,`"${t.artist}"`,t.bpm,t.key,t.mode,t.energy,b?b.position:'']);});
  downloadCSV(rows,singlePlaylistName+'_analysis');
}

// ── EXPORTS ───────────────────────────────────────────────────────────
function exportPlaybookCSV(){
  const rows=[['Position','Avg BPM','Min BPM','Max BPM','Common Key','Avg Energy%','Example 1','Example 2','Example 3']];
  PLAYBOOK.forEach(p=>rows.push([p.position,p.avgBpm,p.minBpm,p.maxBpm,p.commonKey,p.avgEnergy,...p.examples.map(e=>e.name)]));
  downloadCSV(rows,'pilates_playbook');
}
function copyPlaybook(){
  const text='Positional Playbook — @paigelovespilates\n'+'—'.repeat(40)+'\n'+
    PLAYBOOK.map(p=>`#${String(p.position).padStart(2)} | ${p.avgBpm} BPM (${p.minBpm}–${p.maxBpm}) | ${p.commonKey} | ${p.avgEnergy}% energy | e.g. ${p.examples[0]?.name}`).join('\n');
  navigator.clipboard.writeText(text).then(()=>alert('Copied!'));
}
function downloadCSV(rows,name){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([rows.map(r=>r.join(',')).join('\n')],{type:'text/csv'}));
  a.download=name.replace(/[^a-z0-9]/gi,'_')+'.csv';a.click();
}

init();
</script>
