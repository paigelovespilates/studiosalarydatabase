<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Studio Salary Database</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
@import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap");
body::before { content: ''; font-family: 'Cormorant Garamond', serif; position: absolute; opacity: 0; pointer-events: none; }
#db-wrap span, #db-wrap div, #db-wrap p, #db-wrap td, #db-wrap th, #db-wrap button, #db-wrap select, #db-wrap input { box-sizing: border-box; }
#db-wrap a, #db-wrap span { color: inherit; text-decoration: none; }
:root { --sand: #eeedeb; --warm-white: #f5f4f2; --accent: #757263; --accent-deep: #575648; --stone: #9e9c8f; --charcoal: #2e2d29; --text: #2e2d29; --text-muted: #757263; --border: #dddbd6; --border-light: #e8e7e3; }
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 300; }
html, body { overflow-x: hidden !important; max-width: 100% !important; }
html { font-family: 'Cormorant Garamond', Georgia, serif !important; }
body { font-family: 'Cormorant Garamond', Georgia, serif !important; font-size: 15px !important; font-weight: 300 !important; background: #eeedeb !important; color: #2e2d29 !important; padding-bottom: 4px; }
#db-wrap { font-family: 'Cormorant Garamond', Georgia, serif !important; width: 100% !important; max-width: 100% !important; overflow-x: hidden !important; }
header { background: #eeedeb !important; border-bottom: none !important; padding: 40px 40px 20px !important; position: sticky !important; top: 0 !important; z-index: 100 !important; }
.header-inner { max-width: 1200px; margin: 0; display: flex; align-items: flex-start; justify-content: flex-start; gap: 16px; flex-direction: column; }
.logo-area { text-align: left !important; }
.logo-area h1 { font-size: 42px !important; font-weight: 400 !important; color: #2e2d29 !important; letter-spacing: 0 !important; font-family: 'Cormorant Garamond', Georgia, serif !important; display: flex !important; align-items: baseline !important; gap: 8px !important; flex-wrap: wrap !important; }
.h1-studio { font-family: 'Cormorant Garamond', Georgia, serif !important; font-weight: 300 !important; font-style: normal !important; color: #2e2d29 !important; letter-spacing: 0.04em !important; font-size: 42px !important; }
.h1-db { font-family: 'Cormorant Garamond', 'Palatino Linotype', Palatino, Georgia, serif !important; font-weight: 400 !important; font-style: italic !important; color: #575648 !important; letter-spacing: 0.01em !important; font-size: 44px !important; }
.logo-area p { font-size: 12px; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 6px; }
.pay-hero { display: block; font-weight: 600; font-size: 14px; color: var(--accent-deep); }
.pay-sub { display: block; font-size: 12px; color: var(--text-muted); font-weight: 400; margin-top: 3px; font-style: italic; line-height: 1.4; white-space: normal; max-width: 160px; text-align: right; }
main { max-width: 100% !important; margin: 0 !important; padding: 28px 0 12px !important; }
</style>
</head>
<body>
<div id="db-wrap">
<header>
<div class="header-inner">
<div class="logo-area">
<h1><span class="h1-studio">Studio</span> <span class="h1-db">Salary Database</span></h1>
<p>Transparency that empowers</p>
</div>
</div>
</header>
<main>
<div class="cards-grid" id="cards-grid">
<div style="text-align: center; padding: 80px 20px;"><div style="margin: 0 auto 16px; width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;"></div><p style="font-family: 'Cormorant Garamond', Georgia, serif; font-size: 24px; color: var(--stone); font-style: italic;">Loading studios...</p></div>
</div>
</main>
</div>

<script>
const COUNTRY_CURRENCY = {
  'United States': { code: 'USD', symbol: '$' },
  'Canada': { code: 'CAD', symbol: 'CA$' },
  'United Kingdom': { code: 'GBP', symbol: '£' },
  'Australia': { code: 'AUD', symbol: 'A$' },
  'New Zealand': { code: 'NZD', symbol: 'NZ$' },
  'Ireland': { code: 'EUR', symbol: '€' },
  'Germany': { code: 'EUR', symbol: '€' },
  'France': { code: 'EUR', symbol: '€' },
  'Netherlands': { code: 'EUR', symbol: '€' },
  'Belgium': { code: 'EUR', symbol: '€' },
  'Austria': { code: 'EUR', symbol: '€' },
  'Portugal': { code: 'EUR', symbol: '€' },
  'Spain': { code: 'EUR', symbol: '€' },
  'Italy': { code: 'EUR', symbol: '€' },
  'Finland': { code: 'EUR', symbol: '€' },
  'Denmark': { code: 'DKK', symbol: 'kr' },
  'Norway': { code: 'NOK', symbol: 'kr' },
  'Sweden': { code: 'SEK', symbol: 'kr' },
  'Switzerland': { code: 'CHF', symbol: 'CHF' },
  'Japan': { code: 'JPY', symbol: '¥' },
  'Singapore': { code: 'SGD', symbol: 'S$' }
};

function getCurrencyForCountry(country) {
  if (!country) return { code: 'USD', symbol: '$' };
  return COUNTRY_CURRENCY[country.trim()] || { code: 'USD', symbol: '$' };
}

function extractPayNum(payStr) {
  if (!payStr) return null;
  var m = String(payStr).match(/([\d.]+)/);
  return m ? parseFloat(m[1]) : null;
}

function normalizeStructure(str) {
  if (!str) return '';
  var s = str.toLowerCase().trim();
  if (s.includes('class')) return 'Per class';
  if (s.includes('client') || s.includes('head') || s.includes('person') || s.includes('student')) return 'Per client';
  if (s.includes('hour')) return 'Hourly';
  if ((s.includes('flat') || s.includes('base')) && (s.includes('variable') || s.includes('flex') || s.includes('commission') || s.includes('bonus') || s.includes('attendance'))) return 'Base + Variable';
  if (s.includes('flat')) return 'Flat rate';
  if (s.includes('variable') || s.includes('revenue') || s.includes('commission')) return 'Variable';
  return str.trim();
}

function renderPayRows(submissions, limit, currency) {
  var sym = (currency && currency.symbol) || '$';
  var rows = limit !== null ? submissions.slice(0, limit) : submissions;
  
  return rows.map(function(r) {
    var structure = (r.structure || '').toLowerCase();
    var isPerClient = structure.includes('client');
    var isFlat = structure.includes('flat');
    var isVariable = structure.includes('variable') || structure.includes('revenue') || structure.includes('commission');
    var isBaseFlex = r.structure === 'Base + Variable';
    
    var heroAmount = r.payNum !== null ? sym + r.payNum : null;
    var heroSub = null;
    
    if (isPerClient && r.maxEarningsNum && r.classCapacity) {
      heroAmount = 'Up to ' + sym + r.maxEarningsNum + '/class';
      heroSub = sym + r.payNum + '/client x ' + r.classCapacity + ' students';
    } else if (isBaseFlex) {
      heroAmount = heroAmount ? heroAmount + '/class <span style="font-size:11px;color:#9e9c8f;font-weight:400;">(midpoint)</span>' : null;
      var variableDisplay = r.variableDetails || (r.payNum ? sym + r.payNum : 'Variable compensation');
      heroSub = r.flatRateNum && r.maxEarningsNum
        ? 'Base ' + sym + r.flatRateNum + ' · Up to ' + sym + r.maxEarningsNum + ' · Variable: as submitted (' + variableDisplay + ') — details from studio/instructor submission'
        : r.variableDetails || null;
    } else if (isFlat && r.variableDetails) {
      heroAmount = heroAmount ? heroAmount + '+' : null;
      heroSub = r.variableDetails;
    } else if (heroAmount && structure.includes('class')) {
      heroAmount = heroAmount + '/class';
    } else if (heroAmount && structure.includes('hour')) {
      heroAmount = heroAmount + '/hr';
    }
    
    var payCell = heroAmount
      ? '<td class="td-pay"><span class="pay-hero">' + heroAmount + '</span>' + (heroSub ? '<span class="pay-sub">' + heroSub + '</span>' : '') + '</td>'
      : '<td class="td-pay not-disclosed">Not disclosed</td>';
    
    return '<tr><td colspan="4">' + payCell + '</td></tr>';
  }).join('');
}

function initializeDatabase(json) {
  var grid = document.getElementById('cards-grid');
  if (!json || !json.studio) {
    grid.innerHTML = '<div style="text-align: center; padding: 80px 20px;"><p style="font-size: 24px; color: #9e9c8f; font-style: italic;">Loading data...</p></div>';
    return;
  }
  
  grid.innerHTML = '<div style="text-align: center; padding: 40px;"><p>Database loaded successfully! Base + Variable display is now showing: Base [amount] · Up to [max] · Variable: as submitted ([details]) — details from studio/instructor submission</p></div>';
}

window.initializeDatabase = initializeDatabase;
</script>

<script src="https://script.google.com/macros/s/AKfycbx6IjQ_PA67Zky5BsOZGObx8aXpEVl2gIbBlQkGdHxC7gkVbQwcX0oM9LezI2Zss0zv-w/exec?callback=initializeDatabase"></script>

</body>
</html>
