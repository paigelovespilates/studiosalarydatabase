<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio DB — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f5f4f0;
      min-height: 100vh;
    }

    /* ── Password gate ───────────────────────────────────────── */
    #gate {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .gate-card {
      background: #fff;
      border: 0.5px solid #ddd;
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .gate-card h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 6px;
    }

    .gate-card p {
      font-size: 13px;
      color: #888;
      margin-bottom: 28px;
    }

    .gate-input {
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 10px 14px;
      border: 0.5px solid #ddd;
      border-radius: 7px;
      background: #f5f4f0;
      color: #1a1a1a;
      outline: none;
      margin-bottom: 12px;
      letter-spacing: 0.05em;
    }
    .gate-input:focus { border-color: #373930; background: #fff; }
    .gate-input.error { border-color: #c0392b; background: #fef8f8; }

    .gate-btn {
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 10px;
      border-radius: 7px;
      border: none;
      background: #373930;
      color: #EDEBE4;
      cursor: pointer;
      transition: background 0.15s;
    }
    .gate-btn:hover { background: #4a4d40; }

    .gate-error {
      font-size: 12px;
      color: #c0392b;
      margin-top: 10px;
      min-height: 16px;
    }

    /* ── Main app ────────────────────────────────────────────── */
    #app { display: none; }

    .adm-header {
      background: #373930;
      color: #EDEBE4;
      padding: 20px 24px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .adm-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 600;
      color: #EDEBE4;
      margin-bottom: 12px;
    }

    .adm-controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .adm-controls input[type=text],
    .adm-controls select {
      background: rgba(237,235,228,0.12);
      border: 0.5px solid rgba(237,235,228,0.3);
      color: #EDEBE4;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
    }
    .adm-controls input[type=text] { flex: 1; min-width: 180px; }
    .adm-controls input::placeholder { color: rgba(237,235,228,0.45); }
    .adm-controls input:focus,
    .adm-controls select:focus { border-color: rgba(237,235,228,0.6); }
    .adm-controls select option { background: #373930; }

    .adm-stats {
      background: rgba(55,57,48,0.07);
      padding: 6px 24px;
      font-size: 12px;
      color: #666;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .adm-stats span { color: #373930; font-weight: 500; }

    .adm-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 12px;
      padding: 16px;
    }

    .adm-tile {
      background: #fff;
      border: 0.5px solid #ddd;
      border-radius: 10px;
      padding: 14px 16px;
      transition: opacity 0.3s;
    }
    .adm-tile.excluded { opacity: 0.45; }

    .adm-tile-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }
    .adm-tile-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px;
      font-weight: 600;
      color: #1a1a1a;
      line-height: 1.2;
    }
    .adm-tile-location { font-size: 12px; color: #888; margin-bottom: 8px; }
    .adm-tile-rawname  { font-size: 11px; color: #aaa; margin-top: 2px; font-style: italic; }

    .adm-tile-badges { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
    .adm-badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
    .adm-badge-studio     { background: #EDEBE4; color: #373930; }
    .adm-badge-instructor { background: #e8edf4; color: #2d4a6b; }
    .adm-badge-format     { background: #f0f0ee; color: #555; }
    .adm-badge-pay        { background: #e8f4ec; color: #2d6b45; }
    .adm-badge-clean          { background: #e8f0fb; color: #2a4a8a; }
    .adm-badge-clean-inherited { background: #f0f4fd; color: #6a82b4; font-style: italic; }
    .adm-badge-interest       { background: #fdf3dc; color: #7a4f0d; border: 0.5px solid #e8c96a; cursor: default; position: relative; }
    .adm-badge-interest:hover .adm-interest-tooltip {
      display: block;
    }
    .adm-interest-tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #2a2a22;
      color: #f5f3ec;
      font-size: 11px;
      font-weight: 400;
      line-height: 1.45;
      padding: 7px 10px;
      border-radius: 6px;
      width: 220px;
      white-space: normal;
      z-index: 200;
      pointer-events: none;
      font-style: normal;
    }
    .adm-interest-tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: #2a2a22;
    }
    .adm-badge-scoring { background: #f5f4f0; color: #aaa; border: 0.5px solid #ddd; font-style: italic; }

    .adm-story-callout {
      background: #fdf8ec;
      border: 0.5px solid #e8c96a;
      border-radius: 7px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }
    .adm-story-callout-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #a07820;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .adm-story-field {
      margin-bottom: 8px;
    }
    .adm-story-field:last-child { margin-bottom: 0; }
    .adm-story-field-label {
      font-size: 10px;
      color: #b89030;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 3px;
    }
    .adm-story-field-text {
      font-size: 13px;
      color: #2a2010;
      line-height: 1.5;
    }

    .adm-edit-section {
      border-top: 0.5px solid #e8e8e5;
      margin-top: 10px;
      padding-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .adm-edit-row { display: flex; align-items: center; gap: 7px; }
    .adm-edit-label { font-size: 11px; color: #888; width: 74px; flex-shrink: 0; }
    .adm-edit-input {
      flex: 1;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      background: #f5f4f0;
      border: 0.5px solid #ddd;
      border-radius: 5px;
      padding: 4px 8px;
      color: #1a1a1a;
      outline: none;
      min-width: 0;
    }
    .adm-edit-input:focus { border-color: #888; background: #fff; }
    .adm-edit-input.dirty { border-color: #b87c2a; background: #fdf8f0; color: #5a3d0a; }

    .adm-btn-save {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 5px;
      cursor: pointer;
      border: 0.5px solid #2d6b45;
      background: transparent;
      color: #2d6b45;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .adm-btn-save:hover { background: #2d6b45; color: #fff; }
    .adm-btn-save:disabled { opacity: 0.45; cursor: not-allowed; }

    .adm-tile-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 0.5px solid #e8e8e5;
    }
    .adm-tile-date { font-size: 11px; color: #aaa; }

    .adm-btn-expand {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 5px;
      cursor: pointer;
      border: 0.5px solid #ccc;
      background: transparent;
      color: #888;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .adm-btn-expand:hover { border-color: #555; color: #333; }
    .adm-btn-expand.open  { border-color: #373930; color: #373930; }

    .adm-details {
      border-top: 0.5px solid #e8e8e5;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .adm-detail-row {
      display: flex;
      gap: 8px;
      font-size: 12px;
      line-height: 1.5;
    }
    .adm-detail-label {
      font-size: 11px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      width: 90px;
      flex-shrink: 0;
      padding-top: 1px;
    }
    .adm-detail-value {
      color: #333;
      flex: 1;
    }
    .adm-detail-value.highlight {
      color: #2d6b45;
      font-weight: 500;
    }
    .adm-detail-section {
      font-size: 10px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 4px;
      margin-bottom: 2px;
      border-top: 0.5px solid #f0f0ee;
      padding-top: 8px;
    }

    .adm-btn-exclude {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      border: 0.5px solid;
      background: transparent;
      transition: all 0.15s;
    }
    .adm-btn-exclude.active { border-color: #c0392b; color: #c0392b; }
    .adm-btn-exclude.active:hover { background: #c0392b; color: #fff; }
    .adm-btn-exclude.undo { border-color: #bbb; color: #888; }
    .adm-btn-exclude.undo:hover { border-color: #555; color: #333; }
    .adm-btn-exclude:disabled { opacity: 0.5; cursor: not-allowed; }

    .adm-row-chip {
      font-size: 10px;
      color: #aaa;
      background: #f0f0ee;
      border-radius: 4px;
      padding: 2px 5px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .adm-spinner {
      display: inline-block;
      width: 10px; height: 10px;
      border: 1.5px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: adm-spin 0.6s linear infinite;
      margin-right: 4px;
      vertical-align: middle;
    }
    @keyframes adm-spin { to { transform: rotate(360deg); } }

    .adm-state { text-align: center; padding: 60px 24px; color: #888; font-size: 14px; }
    .adm-state.error { color: #c0392b; }

    .adm-pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 20px 16px 40px;
      font-size: 13px;
      color: #666;
    }
    .adm-page-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 16px;
      border-radius: 6px;
      border: 0.5px solid #ccc;
      background: #fff;
      color: #373930;
      cursor: pointer;
      transition: all 0.15s;
    }
    .adm-page-btn:hover:not(:disabled) { background: #373930; color: #EDEBE4; border-color: #373930; }
    .adm-page-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .adm-page-info { color: #888; font-size: 12px; }

    #adm-toast {
      position: fixed;
      bottom: 24px; right: 24px;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      z-index: 9999;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.2s;
      pointer-events: none;
      background: #373930;
      color: #EDEBE4;
    }
    #adm-toast.show  { opacity: 1; transform: translateY(0); }
    #adm-toast.ok    { background: #2d6b45; }
    #adm-toast.error { background: #a33; }

    .adm-save-all-bar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      padding: 8px 16px;
      background: #f0ede6;
      border-top: 0.5px solid #ddd;
      border-bottom: 0.5px solid #ddd;
    }
    .adm-save-all-msg {
      font-size: 12px;
      color: #888;
      flex: 1;
    }
    .adm-btn-save-all {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 7px 18px;
      border-radius: 7px;
      cursor: pointer;
      border: none;
      background: #373930;
      color: #EDEBE4;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .adm-btn-save-all:hover { background: #4a4d40; }
    .adm-btn-save-all:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>

  <!-- Password gate -->
  <div id="gate">
    <div class="gate-card">
      <h1>Studio DB</h1>
      <p>Admin access only</p>
      <input class="gate-input" type="password" id="gate-pw" placeholder="Password"
        onkeydown="if(event.key==='Enter') gateSubmit()">
      <button class="gate-btn" onclick="gateSubmit()">Enter</button>
      <div class="gate-error" id="gate-err"></div>
    </div>
  </div>

  <!-- Main app (hidden until password correct) -->
  <div id="app">
    <div class="adm-header">
      <h1>Studio tile review</h1>
      <div class="adm-controls">
        <input type="text" id="adm-name" placeholder="Studio name…" oninput="admFilter()">
        <input type="text" id="adm-city" placeholder="City…" oninput="admFilter()">
        <select id="adm-src" onchange="admFilter()">
          <option value="">Studio + instructor</option>
          <option value="studio">Studio only</option>
          <option value="instructor">Instructor only</option>
        </select>
        <select id="adm-fmt" onchange="admFilter()">
          <option value="">All formats</option>
        </select>
        <select id="adm-exc" onchange="admFilter()">
          <option value="all">All tiles</option>
          <option value="active">Active only</option>
          <option value="excluded">Excluded only</option>
        </select>
        <select id="adm-date" onchange="admFilter()">
          <option value="all">All time</option>
          <option value="today">Today</option>
          <option value="yesterday">Yesterday</option>
          <option value="week">This week</option>
          <option value="month">This month</option>
          <option value="90days">Last 90 days</option>
        </select>
        <select id="adm-sort" onchange="admFilter()">
          <option value="date">Newest first</option>
          <option value="interest">✨ Interest</option>
        </select>
        <select id="adm-story" onchange="admFilter()">
          <option value="all">All tiles</option>
          <option value="stories">✨ Has story</option>
        </select>
        <button id="adm-clear-btn" onclick="admClearFilters()" style="display:none;font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 12px;border-radius:6px;border:0.5px solid rgba(237,235,228,0.5);background:transparent;color:#EDEBE4;cursor:pointer;white-space:nowrap;opacity:0.8;">✕ Clear</button>
      </div>
    </div>
    <div class="adm-stats" id="adm-stats">Loading…</div>
    <div class="adm-save-all-bar" id="adm-save-all-top" style="display:none;">
      <span class="adm-save-all-msg" id="adm-save-all-msg-top"></span>
      <button class="adm-btn-save-all" onclick="admSaveAll()">Save all changes</button>
    </div>
    <div class="adm-grid" id="adm-grid">
      <div class="adm-state">
        <span class="adm-spinner" style="width:16px;height:16px;border-width:2px;display:inline-block;margin-right:8px;"></span>
        Loading from Google Sheets…
      </div>
    </div>
    <div class="adm-pagination" id="adm-pagination" style="display:none;">
      <button class="adm-page-btn" id="adm-prev" onclick="admChangePage(-1)">← Prev</button>
      <span class="adm-page-info" id="adm-page-info"></span>
      <button class="adm-page-btn" id="adm-next" onclick="admChangePage(1)">Next →</button>
    </div>
    <div class="adm-save-all-bar" id="adm-save-all-bottom" style="display:none;">
      <span class="adm-save-all-msg" id="adm-save-all-msg-bottom"></span>
      <button class="adm-btn-save-all" onclick="admSaveAll()">Save all changes</button>
    </div>
  </div>

  <div id="adm-toast"></div>

  <script>
    // ── Password ───────────────────────────────────────────────────────────────
    // Change this to whatever password you want
    const ADMIN_PASSWORD = '030219';

    const SESSION_KEY = 'sdb_admin_auth';

    function gateSubmit() {
      const pw = document.getElementById('gate-pw').value;
      const inp = document.getElementById('gate-pw');
      const err = document.getElementById('gate-err');
      if (pw === ADMIN_PASSWORD) {
        sessionStorage.setItem(SESSION_KEY, '1');
        document.getElementById('gate').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        admLoad();
      } else {
        inp.classList.add('error');
        err.textContent = 'Incorrect password.';
        inp.value = '';
        setTimeout(() => { inp.classList.remove('error'); err.textContent = ''; }, 2500);
      }
    }

    // Check if already authenticated this session
    if (sessionStorage.getItem(SESSION_KEY) === '1') {
      document.getElementById('gate').style.display = 'none';
      document.getElementById('app').style.display = 'block';
    }

    // ── Config ─────────────────────────────────────────────────────────────────
    const ENDPOINT    = 'https://script.google.com/macros/s/AKfycbx6IjQ_PA67Zky5BsOZGObx8aXpEVl2gIbBlQkGdHxC7gkVbQwcX0oM9LezI2Zss0zv-w/exec';
    const EXCL_REASON = 'marked exclude in UI';

    let allRows = [];
    let pending = new Set();

    // ── Toast ──────────────────────────────────────────────────────────────────
    function toast(msg, type) {
      const el = document.getElementById('adm-toast');
      el.textContent = msg;
      el.className = 'show' + (type ? ' ' + type : '');
      clearTimeout(el._t);
      el._t = setTimeout(() => el.className = '', 3200);
    }

    // ── JSONP ──────────────────────────────────────────────────────────────────
    function jsonp(params) {
      return new Promise((resolve, reject) => {
        const cbName = '_admCb' + Date.now() + Math.floor(Math.random() * 1e6);
        const timer  = setTimeout(() => {
          delete window[cbName];
          if (script.parentNode) script.parentNode.removeChild(script);
          reject(new Error('Request timed out'));
        }, 20000);
        window[cbName] = function(data) {
          clearTimeout(timer);
          delete window[cbName];
          if (script.parentNode) script.parentNode.removeChild(script);
          resolve(data);
        };
        const qs = new URLSearchParams(params);
        qs.set('callback', cbName);
        const script = document.createElement('script');
        script.src = ENDPOINT + '?' + qs.toString();
        script.onerror = () => {
          clearTimeout(timer);
          delete window[cbName];
          reject(new Error('Script load failed — check that the Apps Script is deployed as "Anyone"'));
        };
        document.head.appendChild(script);
      });
    }

    // ── Pay display ────────────────────────────────────────────────────────────
    function fmtPay(r, src) {
      const tryParse = v => { const n = parseFloat(String(v).replace(/[^0-9.]/g, ' ')); return n > 0 ? n : null; };
      if (src === 'studio') {
        const n = tryParse(r[10]) || tryParse(r[16]) || tryParse(r[19]);
        if (n) return '$' + n.toFixed(0) + (tryParse(r[10]) ? '/class' : tryParse(r[16]) ? ' flat' : '/hr');
        return String(r[9] || '').slice(0, 40) || null;
      } else {
        const n = tryParse(r[9]) || tryParse(r[11]);
        if (n) return '$' + n.toFixed(0) + (tryParse(r[9]) ? '/class' : ' flat');
        return String(r[8] || '').slice(0, 40) || null;
      }
    }

    // ── Interest badge renderer ────────────────────────────────────────────────
    function renderInterestBadge(s) {
      if (s.interestScore === undefined) return '';
      if (s.interestScore === 'scoring') return '<span class="adm-badge adm-badge-scoring">scoring…</span>';
      if (s.interestScore < 3) return '';
      const stars = '✨'.repeat(Math.min(s.interestScore - 2, 3)); // 1–3 stars for scores 3–5
      const reason = String(s.interestReason || '').replace(/"/g, '&quot;').replace(/</g, '&lt;');
      return `<span class="adm-badge adm-badge-interest">${stars} ${s.interestScore}/5<span class="adm-interest-tooltip">${reason}</span></span>`;
    }

    // ── Build tile ─────────────────────────────────────────────────────────────
    function buildTile(s) {
      const r = s.row, src = s.source, rn = s.rowIndex, ex = s.excluded;
      const rawName    = String(r[2] || '');
      const rawCity    = src === 'studio' ? String(r[4] || r[5] || '') : String(r[4] || '');
      const state      = String(src === 'studio' ? (r[6] || '') : (r[5] || ''));
      const country    = String(r[3] || '');
      const format     = String(src === 'studio' ? (r[7] || '') : (r[6] || ''));
      const exp        = String(src === 'studio' ? (r[11] || '') : (r[13] || ''));
      const subDate = (() => {
        if (!r[0]) return '';
        const raw = String(r[0]).trim();
        const n = Number(raw);
        if (!isNaN(n) && n > 40000) {
          // Excel serial date — convert to readable date
          const d = new Date(new Date(1900,0,1).getTime() + (n > 60 ? n-2 : n-1) * 86400000);
          return isNaN(d) ? raw : d.toISOString().slice(0,10);
        }
        // ISO or other string — just take first 10 chars
        return raw.slice(0, 10);
      })();
      const cleanName  = String(src === 'studio' ? (r[31] || '') : (r[23] || ''));
      const cleanCity  = String(src === 'studio' ? (r[32] || '') : (r[24] || ''));
      const displayCity = cleanCity || rawCity;  // prefer clean city, same as DB
      const displayName = s.displayName || rawName;
      const pay = fmtPay(r, src);
      const loc = [displayCity, state, country].filter(Boolean).join(', ') || '—';
      const showRawCity = cleanCity && cleanCity.toLowerCase() !== rawCity.toLowerCase() && rawCity;
      const esc = v => String(v).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
      const tid = src + '-' + rn;
      const showRaw = displayName !== rawName && rawName;

      // Determine if clean name/city is direct (set on this row) or inherited (from sibling)
      const hasDirectCleanName    = !!cleanName;
      const hasDirectCleanCity    = !!cleanCity;
      const hasInheritedCleanName = !hasDirectCleanName && !!s.inheritedCleanName;
      const hasInheritedCleanCity = !hasDirectCleanCity && !!s.inheritedCleanCity;

      return `
        <div class="adm-tile${ex ? ' excluded' : ''}" id="adm-tile-${tid}"
          data-source="${src}" data-row="${rn}"
          data-name="${esc(rawName.toLowerCase())}"
          data-city="${esc(rawCity.toLowerCase())}"
          data-format="${esc(format.toLowerCase())}"
          data-excluded="${ex ? '1' : '0'}">
          <div class="adm-tile-header">
            <div>
              <div class="adm-tile-name">${esc(displayName) || 'Unnamed'}</div>
              ${showRaw ? `<div class="adm-tile-rawname">raw: ${esc(rawName)}</div>` : ''}
            </div>
            <span class="adm-row-chip">row ${rn}</span>
          </div>
          <div class="adm-tile-location">${esc(loc)}${showRawCity ? ` <span style="font-style:italic;color:#bbb;">(raw: ${esc(rawCity)})</span>` : ''}</div>
          <div class="adm-tile-badges">
            <span class="adm-badge adm-badge-${src}">${src}</span>
            ${format ? `<span class="adm-badge adm-badge-format">${esc(format)}</span>` : ''}
            ${pay    ? `<span class="adm-badge adm-badge-pay">${esc(pay)}</span>` : ''}
            ${exp    ? `<span class="adm-badge adm-badge-format">${esc(exp)}</span>` : ''}
            ${hasDirectCleanName   ? `<span class="adm-badge adm-badge-clean" title="Clean name: ${esc(cleanName)}">✓ name</span>` : ''}
            ${hasInheritedCleanName ? `<span class="adm-badge adm-badge-clean-inherited" title="Inherited clean name: ${esc(s.displayName||'')}">↳ name</span>` : ''}
            ${hasDirectCleanCity   ? `<span class="adm-badge adm-badge-clean" title="Clean city: ${esc(cleanCity)}">✓ city</span>` : ''}
            ${hasInheritedCleanCity ? `<span class="adm-badge adm-badge-clean-inherited" title="Inherited clean city: ${esc(s.inheritedCleanCity||'')}">↳ city</span>` : ''}
            <span id="adm-excbadge-${tid}">${ex ? '<span class="adm-badge adm-badge-excluded">excluded</span>' : ''}</span>
            <span id="adm-ibadge-${tid}">${renderInterestBadge(s)}</span>
          </div>
          <div class="adm-edit-section">
            <div class="adm-edit-row">
              <span class="adm-edit-label">Clean name</span>
              <input class="adm-edit-input" type="text" id="adm-cn-${tid}"
                value="${esc(cleanName)}" placeholder="Clean studio name…"
                oninput="admDirty('adm-cn-${tid}')">
            </div>
            <div class="adm-edit-row">
              <span class="adm-edit-label">Clean city</span>
              <input class="adm-edit-input" type="text" id="adm-cc-${tid}"
                value="${esc(cleanCity)}" placeholder="Clean city…"
                oninput="admDirty('adm-cc-${tid}')">
              <button class="adm-btn-save" id="adm-save-${tid}"
                onclick="admSave('${src}', ${rn})">Save</button>
            </div>
          </div>
          <div class="adm-tile-footer">
            <button class="adm-btn-expand" id="adm-expand-${tid}" onclick="admToggleExpand('${tid}')">
              Details ↓
            </button>
            <span class="adm-tile-date">${subDate}</span>
            <button class="adm-btn-exclude ${ex ? 'undo' : 'active'}" id="adm-btn-${tid}"
              onclick="admExclude('${src}', ${rn}, ${!ex})">
              ${ex ? 'Undo exclude' : 'Exclude tile'}
            </button>
          </div>
          <div class="adm-details" id="adm-details-${tid}" style="display:none;">
            ${buildDetails(r, src, s)}
          </div>
        </div>`;
    }

    // ── Compute display names for all rows (call after load or after a save) ──
    function computeDisplayNames() {
      const norm = s => String(s || '').trim().toLowerCase();
      const titleCase = s => s.replace(/(^\w|\s\w)/g, m => m.toUpperCase());

      // Build: normRawName → { cleanName, cleanCity } from any row that has them set
      const nameCityMap = {};
      const cleanNameMap = {};   // normRawName → canonical clean name
      const cleanCityMap = {};   // normRawName → canonical clean city
      allRows.filter(s => !s.excluded).forEach(s => {
        const r        = s.row, src = s.source;
        const rawName  = String(r[2] || '').trim();
        const cleanN   = String(src === 'studio' ? (r[31] || '') : (r[23] || '')).trim();
        const cleanC   = String(src === 'studio' ? (r[32] || '') : (r[24] || '')).trim();
        const baseName = cleanN || rawName;
        const rawCity  = String(src === 'studio' ? (r[4] || r[5] || '') : (r[4] || '')).trim();
        const city     = cleanC || rawCity;
        const key      = norm(baseName);
        if (!key) return;
        if (!nameCityMap[key]) nameCityMap[key] = new Set();
        if (city) nameCityMap[key].add(norm(city));
        // Track canonical clean name/city by raw name key for fallback
        const rawKey = norm(rawName);
        if (cleanN && !cleanNameMap[rawKey]) cleanNameMap[rawKey] = cleanN;
        if (cleanC && !cleanCityMap[rawKey]) cleanCityMap[rawKey] = cleanC;
      });

      allRows.forEach(s => {
        const r        = s.row, src = s.source;
        const rawName  = String(r[2] || '').trim();
        const cleanN   = String(src === 'studio' ? (r[31] || '') : (r[23] || '')).trim();
        const cleanC   = String(src === 'studio' ? (r[32] || '') : (r[24] || '')).trim();
        const rawCity  = String(src === 'studio' ? (r[4] || r[5] || '') : (r[4] || '')).trim();
        const rawKey   = norm(rawName);

        // Use direct clean name if set, otherwise inherit from sibling — but only if cities match
        const inheritedName = cleanNameMap[rawKey];
        const inheritedCity = cleanCityMap[rawKey];
        const citiesMatch = !inheritedCity || !rawCity ||
          norm(inheritedCity) === norm(rawCity);
        const resolvedName = cleanN || (citiesMatch ? inheritedName : null) || rawName;
        const resolvedCity = cleanC || (citiesMatch ? inheritedCity : null) || rawCity;
        const key      = norm(resolvedName);
        const cityCount = nameCityMap[key] ? nameCityMap[key].size : 1;

        s.displayName = cityCount > 1 && resolvedCity
          ? resolvedName + ' ' + titleCase(resolvedCity)
          : resolvedName;

        // Track inherited flags for badge display
        s.inheritedCleanName = !cleanN && !!cleanNameMap[rawKey] ? cleanNameMap[rawKey] : null;
        s.inheritedCleanCity = !cleanC && !!cleanCityMap[rawKey] && cityCount <= 1 ? cleanCityMap[rawKey] : null;
      });
    }

    // ── Interest scoring ───────────────────────────────────────────────────────
    // Fields scored per source type:
    //   instructor: r[15]=Negotiated, r[16]=Negotiation Notes, r[19]=Other Perks, r[29]=Working Here Comments
    //   studio:     r[22]=Other Perks, r[24]=Notes

    // Noise words that pass length check but have no story value
    const NOISE_PATTERN = /^(no|n\/a|na|none|not sure|idk|yes|no comment|nothing|nope|good|great|fine|ok|okay|well|well!|denied|n\/a\.|-)\.?$/i;

    function isSubstantive(text, minLen) {
      if (!text || text.length < minLen) return false;
      if (NOISE_PATTERN.test(text.trim())) return false;
      return true;
    }

    function getTextToScore(s) {
      const r = s.row;
      const parts = [];
      if (s.source === 'instructor') {
        const negNotes   = String(r[16] || '').trim();
        const otherPerks = String(r[19] || '').trim();
        const workingHere = String(r[29] || '').trim();
        if (isSubstantive(negNotes, 15))   parts.push('Negotiation notes: ' + negNotes);
        if (isSubstantive(otherPerks, 15)) parts.push('Other perks: ' + otherPerks);
        if (isSubstantive(workingHere, 15)) parts.push('Working here: ' + workingHere);
      } else {
        const otherPerks = String(r[22] || '').trim();
        const notes      = String(r[24] || '').trim();
        if (isSubstantive(otherPerks, 15)) parts.push('Other perks: ' + otherPerks);
        if (isSubstantive(notes, 15))      parts.push('Notes: ' + notes);
      }
      return parts.join('\n\n');
    }

    let scoringStatus = { total: 0, done: 0, found: 0 };

    function updateScoringStatusBar() {
      const bar = document.getElementById('adm-stats');
      if (!bar) return;
      const { total, done, found } = scoringStatus;
      if (total === 0) { admStats(); return; }
      const base = bar.dataset.baseText || '';
      if (done < total) {
        bar.innerHTML = base + ` &nbsp;·&nbsp; <span style="color:#b87c2a">✨ Scoring ${done}/${total}…</span>`;
      } else {
        bar.innerHTML = base + ` &nbsp;·&nbsp; <span style="color:#7a4f0d">✨ ${found} stor${found !== 1 ? 'ies' : 'y'} found</span>`;
      }
    }

    // ── Heuristic interest scorer ──────────────────────────────────────────────
    function heuristicScore(text) {
      if (!text || text.trim().length < 10) return { score: 1, reason: 'Too short to evaluate' };

      const t = text.trim();
      const lower = t.toLowerCase();
      let score = 1;
      const reasons = [];

      // ── Word / sentence structure ──
      const words     = t.split(/\s+/).filter(Boolean);
      const wordCount = words.length;
      const sentences = t.split(/[.!?]+/).map(s => s.trim()).filter(s => s.length > 3);
      const sentCount = sentences.length;

      // Repetition penalty — same word 3+ times
      const wordFreq = {};
      words.forEach(w => { const wl = w.toLowerCase().replace(/[^a-z]/g,''); wordFreq[wl] = (wordFreq[wl]||0)+1; });
      const maxRepeat = Math.max(...Object.values(wordFreq));
      if (maxRepeat >= 3 && wordCount < 15) return { score: 1, reason: 'Repetitive or generic' };

      // All caps penalty
      if (t === t.toUpperCase() && /[A-Z]/.test(t)) return { score: 1, reason: 'All caps' };

      // Pure filler phrases — cap at 2
      const fillerOnly = /^(great( studio| experience| place)?|love it( here)?|highly recommend|amazing|terrible|fine|ok|okay|good experience|bad experience|not great|pretty good|so good|so bad|loved it|hated it)\.?$/i;
      if (fillerOnly.test(t.trim())) return { score: 2, reason: 'Generic phrase with no detail' };

      // ── Base score from length + sentences ──
      if (wordCount >= 8)  { score = 2; }
      if (wordCount >= 15) { score = 2; reasons.push('substantive length'); }
      if (sentCount >= 2)  { score = Math.max(score, 2); }
      if (sentCount >= 3)  { score = Math.max(score, 3); reasons.push('multi-sentence'); }

      // ── Numbers (dollar amounts, percentages, durations) ──
      const hasNumber     = /\$\d+|\d+%|\d+\s*(per|\/)(class|hour|client|hr)|\d+\s*(year|month|week|day)s?|\d{2,}/i.test(t);
      const hasDollar     = /\$\d+|\d+\s*dollar|\d+\s*per\s*(class|hour|client)/i.test(t);
      const hasPercent    = /\d+\s*%|percent/i.test(t);
      if (hasNumber) { score = Math.max(score, 2); reasons.push('specific numbers'); }
      if (hasDollar) { score = Math.max(score, 3); reasons.push('dollar amount'); }

      // ── Negotiation outcome words ──
      const outcomeWords = [
        'raised','denied','countered','offered','declined','accepted','rejected',
        'walked away','left','quit','stayed','matched','negotiated','renegotiated',
        'asked for','pushed back','said no','said yes','turned down','gave me',
        'they offered','she offered','he offered','they said','she said','he said',
        'they told','she told','he told','i asked','i pushed','i left','i quit',
        'i stayed','i ended up','ended up','they agreed','they refused'
      ];
      const hasOutcome = outcomeWords.some(w => lower.includes(w));
      if (hasOutcome) { score = Math.max(score, 3); reasons.push('negotiation outcome'); }

      // ── Power dynamic / relational language ──
      const powerWords = [
        'owner','manager','studio owner','franchise','corporate','hr',
        'pressured','uncomfortable','unfair','underpaid','undervalued',
        'worth it','not worth','burned out','burnout','toxic','supportive',
        'respect','disrespect','transparent','secretive','favorites'
      ];
      const hasPower = powerWords.some(w => lower.includes(w));
      if (hasPower) { score = Math.max(score, 3); reasons.push('workplace dynamic'); }

      // ── Comparison / contrast language ──
      const compareWords = [
        'more than','less than','same as','compared to','other studios','other instructors',
        'new instructors','senior instructors','years of experience','industry standard',
        'market rate','average','below average','above average','competitive','not competitive'
      ];
      const hasCompare = compareWords.some(w => lower.includes(w));
      if (hasCompare) { score = Math.max(score, 3); reasons.push('comparison'); }

      // ── Causal / progression language ──
      const causalWords = [
        'because','so they','which means','ended up','as a result','after that',
        'eventually','finally','months later','a year later','first year','at first',
        'over time','since then','after i','before i','when i','once i'
      ];
      const hasCausal = causalWords.some(w => lower.includes(w));
      if (hasCausal && wordCount >= 12) { score = Math.max(score, 3); reasons.push('narrative arc'); }

      // ── Emotional authenticity ──
      const emotionWords = [
        'honestly','frustrated','surprised','disappointed','relieved','proud',
        'regret','wish i','should have','glad i','happy i','annoyed','upset',
        'excited','nervous','awkward','uncomfortable','grateful','lucky','unfair'
      ];
      const hasEmotion = emotionWords.some(w => lower.includes(w));
      if (hasEmotion) { score = Math.max(score, 2); reasons.push('personal feeling'); }

      // ── Boost: dollar amount + outcome = strong story ──
      if (hasDollar && hasOutcome) {
        score = Math.max(score, 4);
        reasons.push('specific outcome with amount');
      }

      // ── Boost: percent + outcome ──
      if (hasPercent && hasOutcome) {
        score = Math.max(score, 4);
        reasons.push('specific % outcome');
      }

      // ── Boost: 3+ sentences with varied length ──
      if (sentCount >= 3) {
        const lens = sentences.map(s => s.split(/\s+/).length);
        const avg  = lens.reduce((a,b) => a+b, 0) / lens.length;
        const varied = lens.some(l => Math.abs(l - avg) > 3);
        if (varied) { score = Math.max(score, 4); reasons.push('rich narrative'); }
      }

      // ── Boost: long + multi-signal ──
      const signalCount = [hasNumber, hasOutcome, hasPower, hasCompare, hasCausal, hasEmotion].filter(Boolean).length;
      if (signalCount >= 3 && wordCount >= 20) { score = Math.max(score, 4); reasons.push('multi-signal'); }
      if (signalCount >= 4 && wordCount >= 30) { score = 5; reasons.push('exceptionally detailed'); }

      // ── Cap at 2 if very short regardless of signals ──
      if (wordCount < 8) score = Math.min(score, 2);

      // Build reason string
      const reasonMap = {
        1: 'Too vague or short to feature',
        2: 'Some detail but limited story',
        3: reasons.length ? reasons.slice(0,2).join(' + ') : 'Has real content',
        4: reasons.length ? reasons.slice(0,2).join(' + ') : 'Strong specific detail',
        5: 'Exceptionally detailed with multiple story signals'
      };

      return { score, reason: reasonMap[score] || 'Scored' };
    }

    async function scoreRow(s) {
      const text = getTextToScore(s);
      if (!text) return;

      const { score, reason } = heuristicScore(text);
      s.interestScore  = score;
      s.interestReason = reason;
      if (score >= 3) scoringStatus.found++;

      scoringStatus.done++;
      updateScoringStatusBar();

      // Update badge on tile if currently visible
      const tid     = s.source + '-' + s.rowIndex;
      const badgeEl = document.getElementById('adm-ibadge-' + tid);
      if (badgeEl) badgeEl.innerHTML = renderInterestBadge(s);
    }

    async function runInterestScoring() {
      const qualifying = allRows.filter(s => getTextToScore(s).length > 0);
      if (qualifying.length === 0) return;

      scoringStatus = { total: qualifying.length, done: 0, found: 0 };

      // Heuristic scoring is synchronous — run all at once
      qualifying.forEach(s => {
        const { score, reason } = heuristicScore(getTextToScore(s));
        s.interestScore  = score;
        s.interestReason = reason;
        if (score >= 3) scoringStatus.found++;
        scoringStatus.done++;
      });

      updateScoringStatusBar();

      // Re-render current page to show badges
      admRender();
    }

    // ── Toggle details panel ───────────────────────────────────────────────────
    function admToggleExpand(tid) {
      const panel = document.getElementById('adm-details-' + tid);
      const btn   = document.getElementById('adm-expand-' + tid);
      const open  = panel.style.display === 'none';
      panel.style.display = open ? '' : 'none';
      btn.textContent = open ? 'Details ↑' : 'Details ↓';
      btn.classList.toggle('open', open);
    }

    // ── Build details panel HTML ───────────────────────────────────────────────
    function buildDetails(r, src, s) {
      const esc = v => String(v || '').replace(/&/g,'&amp;').replace(/</g,'&lt;');
      const val = (idx) => String(r[idx] || '').trim();
      const row = (label, v, highlight) => v
        ? `<div class="adm-detail-row"><span class="adm-detail-label">${label}</span><span class="adm-detail-value${highlight?' highlight':''}">${esc(v)}</span></div>`
        : '';
      const sec = (label) => `<div class="adm-detail-section">${label}</div>`;

      let html = '';

      // ── Story callout — show scored fields first if interesting ──
      if (s && typeof s.interestScore === 'number' && s.interestScore >= 3) {
        const storyFields = [];
        if (src === 'instructor') {
          const negNotes    = val(16);
          const otherPerks  = val(19);
          const workingHere = val(29);
          if (negNotes    && isSubstantive(negNotes, 15))    storyFields.push({ label: 'Negotiation notes', text: negNotes });
          if (workingHere && isSubstantive(workingHere, 15)) storyFields.push({ label: 'Working here', text: workingHere });
          if (otherPerks  && isSubstantive(otherPerks, 15))  storyFields.push({ label: 'Other perks', text: otherPerks });
        } else {
          const otherPerks = val(22);
          const notes      = val(24);
          if (otherPerks && isSubstantive(otherPerks, 15)) storyFields.push({ label: 'Other perks', text: otherPerks });
          if (notes      && isSubstantive(notes, 15))      storyFields.push({ label: 'Notes', text: notes });
        }
        if (storyFields.length) {
          const stars = '✨'.repeat(Math.min(s.interestScore - 2, 3));
          html += `<div class="adm-story-callout">
            <div class="adm-story-callout-label">${stars} ${s.interestScore}/5 · ${esc(s.interestReason || '')}</div>
            ${storyFields.map(f => `
              <div class="adm-story-field">
                <div class="adm-story-field-label">${f.label}</div>
                <div class="adm-story-field-text">${esc(f.text)}</div>
              </div>`).join('')}
          </div>`;
        }
      }

      if (src === 'studio') {
        // Pay
        html += sec('Compensation');
        html += row('Structure',    val(8));
        html += row('Summary',      val(9));
        html += row('Pay/class',    val(10));
        html += row('Exp level',    val(11));
        html += row('Pay — new',    val(12));
        html += row('Pay — exp',    val(13));
        html += row('Pay/client',   val(14));
        html += row('Capacity',     val(15));
        html += row('Flat rate',    val(16));
        html += row('Variable',     val(17));
        html += row('Max earnings', val(18));
        html += row('Hourly',       val(19));
        // Requirements
        html += sec('Requirements & perks');
        html += row('Exp required', val(20));
        html += row('Benefits',     val(21));
        html += row('Other perks',  val(22));
        // Notes
        html += sec('Notes');
        html += row('Contact',      val(23));
        html += row('Notes',        val(24));
        html += row('Source',       val(25));
        html += row('Add. notes',   val(27));
      } else {
        // Pay
        html += sec('Compensation');
        html += row('Structure',    val(7));
        html += row('Summary',      val(8));
        html += row('Pay/class',    val(9));
        html += row('Pay/client',   val(10));
        html += row('Flat rate',    val(11));
        html += row('Variable',     val(12));
        html += row('Max earnings', val(25));
        html += row('Capacity',     val(18));
        // Experience & negotiation
        html += sec('Experience & negotiation');
        html += row('Experience',   val(13));
        html += row('Negotiated',   val(15), val(15).toLowerCase() === 'yes');
        html += row('Neg rating',   val(26));
        html += row('Neg notes',    val(16), true);
        // Perks
        html += sec('Perks');
        html += row('Perks',        val(14));
        html += row('Other perks',  val(19));
        // Source
        html += sec('Source');
        html += row('Source',       val(17));
      }

      // Strip empty sections (a section with no rows after it)
      return html.replace(/<div class="adm-detail-section">[^<]+<\/div>(\s*<div class="adm-detail-section">)/g, '$1')
                 .replace(/<div class="adm-detail-section">[^<]+<\/div>\s*$/g, '');
    }

    // ── Dirty marker ───────────────────────────────────────────────────────────
    function admDirty(id) {
      document.getElementById(id).classList.add('dirty');
      admUpdateSaveAllBar();
    }

    // ── Update save all bar visibility ─────────────────────────────────────────
    function admUpdateSaveAllBar() {
      const dirtyInputs = document.querySelectorAll('#adm-grid .adm-edit-input.dirty');
      const count = dirtyInputs.length;
      const show = count > 0;
      // Count dirty tiles (each tile can have 2 dirty inputs)
      const dirtyTiles = new Set();
      dirtyInputs.forEach(el => {
        const tile = el.closest('.adm-tile');
        if (tile) dirtyTiles.add(tile.id);
      });
      const msg = show ? `${dirtyTiles.size} tile${dirtyTiles.size !== 1 ? 's' : ''} with unsaved changes` : '';
      ['top','bottom'].forEach(pos => {
        const bar = document.getElementById('adm-save-all-' + pos);
        const msgEl = document.getElementById('adm-save-all-msg-' + pos);
        if (bar) bar.style.display = show ? 'flex' : 'none';
        if (msgEl) msgEl.textContent = msg;
      });
    }

    // ── Save all dirty tiles on current page ───────────────────────────────────
    async function admSaveAll() {
      // Snapshot dirty tile identifiers BEFORE any DOM changes
      const dirtyTileData = [];
      const seen = new Set();
      document.querySelectorAll('#adm-grid .adm-edit-input.dirty').forEach(el => {
        const tile = el.closest('.adm-tile');
        if (!tile || seen.has(tile.id)) return;
        seen.add(tile.id);
        dirtyTileData.push({ src: tile.dataset.source, rn: parseInt(tile.dataset.row) });
      });

      if (!dirtyTileData.length) return;

      // Disable both save all buttons
      document.querySelectorAll('.adm-btn-save-all').forEach(b => {
        b.disabled = true;
        b.innerHTML = '<span class="adm-spinner"></span> Saving…';
      });

      let saved = 0, failed = 0;
      for (const { src, rn } of dirtyTileData) {
        const tid  = src + '-' + rn;
        const cnEl = document.getElementById('adm-cn-' + tid);
        const ccEl = document.getElementById('adm-cc-' + tid);
        if (!cnEl || !ccEl) continue;

        const params = { action: 'updateCleanFields', source: src, rowIndex: rn };
        if (cnEl.classList.contains('dirty') && cnEl.value.trim()) params.cleanName = cnEl.value.trim();
        if (ccEl.classList.contains('dirty') && ccEl.value.trim()) params.cleanCity = ccEl.value.trim();

        if (!params.cleanName && !params.cleanCity) {
          cnEl.classList.remove('dirty');
          ccEl.classList.remove('dirty');
          continue;
        }

        try {
          const d = await jsonp(params);
          if (!d.success) throw new Error(d.error || 'Unknown error');
          cnEl.classList.remove('dirty');
          ccEl.classList.remove('dirty');
          const s = allRows.find(x => x.source === src && x.rowIndex === rn);
          if (s) {
            if (src === 'studio') {
              if (params.cleanName) s.row[31] = params.cleanName;
              if (params.cleanCity) s.row[32] = params.cleanCity;
            } else {
              if (params.cleanName) s.row[23] = params.cleanName;
              if (params.cleanCity) s.row[24] = params.cleanCity;
            }
          }
          saved++;
        } catch (err) {
          failed++;
          console.error('Save all error row ' + rn + ':', err.message);
        }
      }

      // Recompute display names once after all saves
      computeDisplayNames();

      // Collect tile elements to re-render BEFORE any outerHTML swaps
      const tilesToRender = [];
      document.querySelectorAll('#adm-grid .adm-tile').forEach(tileEl => {
        const tileRow = allRows.find(x => x.source === tileEl.dataset.source && x.rowIndex === parseInt(tileEl.dataset.row));
        if (tileRow) tilesToRender.push({ el: tileEl, row: tileRow });
      });
      // Now do all outerHTML swaps
      tilesToRender.forEach(({ el, row }) => { el.outerHTML = buildTile(row); });

      admUpdateSaveAllBar();

      if (failed > 0) {
        toast(`Saved ${saved}, failed ${failed} — check console`, 'error');
      } else {
        toast(`Saved ${saved} tile${saved !== 1 ? 's' : ''}`, 'ok');
      }

      // Re-query buttons after DOM changes
      document.querySelectorAll('.adm-btn-save-all').forEach(b => {
        b.disabled = false;
        b.textContent = 'Save all changes';
      });
    }

    // ── Save clean fields ──────────────────────────────────────────────────────
    async function admSave(source, rowIndex) {
      const tid  = source + '-' + rowIndex;
      const cnEl = document.getElementById('adm-cn-' + tid);
      const ccEl = document.getElementById('adm-cc-' + tid);
      const btn  = document.getElementById('adm-save-' + tid);
      btn.disabled = true;
      btn.innerHTML = '<span class="adm-spinner"></span>';
      try {
        const d = await jsonp({
          action: 'updateCleanFields', source, rowIndex,
          ...(cnEl.value.trim() ? { cleanName: cnEl.value.trim() } : {}),
          ...(ccEl.value.trim() ? { cleanCity: ccEl.value.trim() } : {})
        });
        if (!d.success) throw new Error(d.error || 'Unknown error');
        cnEl.classList.remove('dirty');
        ccEl.classList.remove('dirty');

        // Update the row data in memory
        const s = allRows.find(x => x.source === source && x.rowIndex === rowIndex);
        if (s) {
          if (source === 'studio') { s.row[31] = cnEl.value.trim(); s.row[32] = ccEl.value.trim(); }
          else                     { s.row[23] = cnEl.value.trim(); s.row[24] = ccEl.value.trim(); }
        }

        // Recompute display names — saving clean name/city can affect this row
        // AND any sibling rows that share the same studio name
        computeDisplayNames();

        // Re-render any tile currently visible on the page that shares the same
        // base studio name as the saved row (they may have had city appended/removed)
        const savedBaseName = String(s ? (source === 'studio' ? (s.row[31] || s.row[2]) : (s.row[23] || s.row[2])) : '').trim().toLowerCase();
        document.querySelectorAll('#adm-grid .adm-tile').forEach(tileEl => {
          const tileSrc = tileEl.dataset.source;
          const tileRn  = parseInt(tileEl.dataset.row);
          const tileRow = allRows.find(x => x.source === tileSrc && x.rowIndex === tileRn);
          if (!tileRow) return;
          const tileBase = String(tileSrc === 'studio'
            ? (tileRow.row[31] || tileRow.row[2])
            : (tileRow.row[23] || tileRow.row[2])).trim().toLowerCase();
          if (tileBase === savedBaseName) {
            tileEl.outerHTML = buildTile(tileRow);
          }
        });

        toast('Saved — row ' + rowIndex, 'ok');
      } catch (err) {
        toast('Error: ' + err.message, 'error');
      } finally {
        // btn may have been replaced by outerHTML swap above — re-query it
        const newBtn = document.getElementById('adm-save-' + tid);
        if (newBtn) { newBtn.disabled = false; newBtn.textContent = 'Save'; }
      }
    }

    // ── Exclude / restore ──────────────────────────────────────────────────────
    async function admExclude(source, rowIndex, exclude) {
      const key  = source + '-' + rowIndex;
      if (pending.has(key)) return;
      pending.add(key);
      const btn  = document.getElementById('adm-btn-' + key);
      const tile = document.getElementById('adm-tile-' + key);
      btn.disabled = true;
      btn.innerHTML = `<span class="adm-spinner"></span>${exclude ? 'Excluding…' : 'Restoring…'}`;
      try {
        const d = await jsonp({ action: 'setExclude', source, rowIndex, exclude: exclude ? 'Y' : '', reason: exclude ? EXCL_REASON : '' });
        if (!d.success) throw new Error(d.error || 'Unknown error');
        const s = allRows.find(x => x.source === source && x.rowIndex === rowIndex);
        if (s) s.excluded = exclude;
        tile.dataset.excluded = exclude ? '1' : '0';
        tile.className = 'adm-tile' + (exclude ? ' excluded' : '');
        document.getElementById('adm-excbadge-' + key).innerHTML = exclude
          ? '<span class="adm-badge adm-badge-excluded">excluded</span>' : '';
        btn.disabled = false;
        btn.className = 'adm-btn-exclude ' + (exclude ? 'undo' : 'active');
        btn.textContent = exclude ? 'Undo exclude' : 'Exclude tile';
        admStats();
        toast(exclude ? 'Excluded row ' + rowIndex : 'Restored row ' + rowIndex);
      } catch (err) {
        btn.disabled = false;
        const s = allRows.find(x => x.source === source && x.rowIndex === rowIndex);
        btn.className = 'adm-btn-exclude ' + ((s && s.excluded) ? 'undo' : 'active');
        btn.textContent = (s && s.excluded) ? 'Undo exclude' : 'Exclude tile';
        toast('Error: ' + err.message, 'error');
      } finally {
        pending.delete(key);
      }
    }

    // ── Pagination state ───────────────────────────────────────────────────────
    const PAGE_SIZE = 12;
    let currentPage = 1;
    let filteredRows = [];

    // ── Clear all filters ──────────────────────────────────────────────────────
    function admClearFilters() {
      document.getElementById('adm-name').value = '';
      document.getElementById('adm-city').value = '';
      document.getElementById('adm-src').value  = '';
      document.getElementById('adm-fmt').value  = '';
      document.getElementById('adm-exc').value  = 'all';
      document.getElementById('adm-date').value = 'all';
      document.getElementById('adm-sort').value  = 'date';
      document.getElementById('adm-story').value = 'all';
      admFilter();
    }

    // ── Filter + paginate ──────────────────────────────────────────────────────
    function admFilter() {
      const name    = document.getElementById('adm-name').value.toLowerCase().trim();
      const city    = document.getElementById('adm-city').value.toLowerCase().trim();
      const src     = document.getElementById('adm-src').value;
      const fmt     = document.getElementById('adm-fmt').value.toLowerCase();
      const exc     = document.getElementById('adm-exc').value;
      const dateRng = document.getElementById('adm-date').value;
      const sortBy  = document.getElementById('adm-sort').value;
      const storyF  = document.getElementById('adm-story').value;

      // Show/hide clear button
      const isFiltered = name || city || src || fmt || exc !== 'all' || dateRng !== 'all' || sortBy !== 'date' || storyF !== 'all';
      document.getElementById('adm-clear-btn').style.display = isFiltered ? 'block' : 'none';

      // Build date boundary for the selected range (start of day in local time)
      const now = new Date();
      const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      let dateFrom = null;
      let dateTo   = null;
      if (dateRng === 'today') {
        dateFrom = startOfToday;
      } else if (dateRng === 'yesterday') {
        dateFrom = new Date(startOfToday); dateFrom.setDate(dateFrom.getDate() - 1);
        dateTo   = startOfToday;
      } else if (dateRng === 'week') {
        dateFrom = new Date(startOfToday); dateFrom.setDate(dateFrom.getDate() - dateFrom.getDay());
      } else if (dateRng === 'month') {
        dateFrom = new Date(now.getFullYear(), now.getMonth(), 1);
      } else if (dateRng === '90days') {
        dateFrom = new Date(startOfToday); dateFrom.setDate(dateFrom.getDate() - 90);
      }

      filteredRows = allRows.filter(s => {
        const r       = s.row;
        const rawName = String(r[2] || '').toLowerCase();
        const rawCity = s.source === 'studio'
          ? String(r[4] || r[5] || '').toLowerCase()
          : String(r[4] || '').toLowerCase();
        const format  = String(s.source === 'studio' ? (r[7] || '') : (r[6] || '')).toLowerCase();

        // Date filter
        if (dateRng !== 'all') {
          const d = s.dateVal ? new Date(s.dateVal > 40000 ? new Date(1900,0,1).getTime() + (s.dateVal > 60 ? s.dateVal-2 : s.dateVal-1)*86400000 : s.dateVal) : null;
          if (!d || isNaN(d)) return false;
          if (dateFrom && d < dateFrom) return false;
          if (dateTo   && d >= dateTo)  return false;
        }

        // Story filter
        if (storyF === 'stories' && (typeof s.interestScore !== 'number' || s.interestScore < 3)) return false;

        return (!name || rawName.includes(name))
          && (!city || rawCity.includes(city))
          && (!src  || s.source === src)
          && (!fmt  || format === fmt)
          && (exc === 'all'
              || (exc === 'active'   && !s.excluded)
              || (exc === 'excluded' &&  s.excluded));
      });

      // Sort
      if (sortBy === 'interest') {
        filteredRows.sort((a, b) => (b.interestScore || 0) - (a.interestScore || 0));
      }
      // default 'date' sort is already applied at load time on allRows

      currentPage = 1;
      admRender();
    }

    // ── Render current page ────────────────────────────────────────────────────
    function admRender() {
      const grid  = document.getElementById('adm-grid');
      const total = filteredRows.length;
      const pages = Math.max(1, Math.ceil(total / PAGE_SIZE));
      currentPage = Math.min(currentPage, pages);

      const start = (currentPage - 1) * PAGE_SIZE;
      const pageRows = filteredRows.slice(start, start + PAGE_SIZE);

      if (total === 0) {
        grid.innerHTML = '<div class="adm-state">No results match your filters.</div>';
        document.getElementById('adm-pagination').style.display = 'none';
      } else {
        grid.innerHTML = pageRows.map(buildTile).join('');
        document.getElementById('adm-pagination').style.display = 'flex';
        document.getElementById('adm-prev').disabled = currentPage <= 1;
        document.getElementById('adm-next').disabled = currentPage >= pages;
        document.getElementById('adm-page-info').textContent =
          `Page ${currentPage} of ${pages} · ${total} result${total !== 1 ? 's' : ''}`;
      }

      admStats(total);
      window.scrollTo({ top: 0, behavior: 'smooth' });
      admUpdateSaveAllBar();
    }

    function admChangePage(dir) {
      currentPage += dir;
      admRender();
    }

    // ── Stats ──────────────────────────────────────────────────────────────────
    function admStats(visOverride) {
      const total = allRows.length;
      const excl  = allRows.filter(s => s.excluded).length;
      const stud  = allRows.filter(s => s.source === 'studio').length;
      const inst  = allRows.filter(s => s.source === 'instructor').length;
      const bar   = document.getElementById('adm-stats');
      const isF   = document.getElementById('adm-name').value
                    || document.getElementById('adm-city').value
                    || document.getElementById('adm-src').value
                    || document.getElementById('adm-fmt').value
                    || document.getElementById('adm-exc').value !== 'all';
      const baseText = `<span>${total}</span> total (<span>${stud}</span> studio · <span>${inst}</span> instructor) &nbsp;·&nbsp; <span>${total - excl}</span> active &nbsp;·&nbsp; <span>${excl}</span> excluded${isF ? ` &nbsp;·&nbsp; <span>${visOverride !== undefined ? visOverride : total}</span> matching` : ''}`;
      bar.dataset.baseText = baseText;
      // If scoring is in progress, let updateScoringStatusBar handle it
      if (scoringStatus && scoringStatus.total > 0 && scoringStatus.done < scoringStatus.total) {
        bar.innerHTML = baseText + ` &nbsp;·&nbsp; <span style="color:#b87c2a">✨ Scoring ${scoringStatus.done}/${scoringStatus.total}…</span>`;
      } else if (scoringStatus && scoringStatus.total > 0 && scoringStatus.done >= scoringStatus.total) {
        bar.innerHTML = baseText + ` &nbsp;·&nbsp; <span style="color:#7a4f0d">✨ ${scoringStatus.found} stor${scoringStatus.found !== 1 ? 'ies' : 'y'} found</span>`;
      } else {
        bar.innerHTML = baseText;
      }
    }

    // ── Load ───────────────────────────────────────────────────────────────────
    async function admLoad() {
      const grid = document.getElementById('adm-grid');
      try {
        const d = await jsonp({ action: 'getSheet' });
        if (!d.rows || !d.rows.length) { grid.innerHTML = '<div class="adm-state">No rows found.</div>'; return; }

        // Parse submission date for sorting — handles Excel serial numbers and date strings
        function parseDate(val) {
          if (!val) return 0;
          const n = Number(val);
          if (!isNaN(n) && n > 40000) return n; // Excel serial — higher = more recent
          const d = new Date(val);
          return isNaN(d) ? 0 : d.getTime();
        }

        allRows = d.rows.map(item => ({
          source:   item.source,
          rowIndex: item.rowIndex,
          row:      item.row,
          excluded: String(item.row[item.source === 'studio' ? 28 : 20] || '').toUpperCase() === 'Y',
          dateVal:  parseDate(item.row[0])
        }));

        // Drop rows with no studio name (e.g. instructors still in training)
        allRows = allRows.filter(s => String(s.row[2] || '').trim() !== '');

        // Sort most recent first
        allRows.sort((a, b) => b.dateVal - a.dateVal);

        // Compute display names (chain studios get city appended)
        computeDisplayNames();

        // Populate format dropdown
        const fmts = [...new Set(allRows.map(s => s.source === 'studio' ? String(s.row[7] || '') : String(s.row[6] || '')).filter(Boolean))].sort();
        const sel  = document.getElementById('adm-fmt');
        fmts.forEach(f => { const o = document.createElement('option'); o.value = f.toLowerCase(); o.textContent = f; sel.appendChild(o); });

        filteredRows = [...allRows];
        admRender();

        // Start interest scoring in background (non-blocking)
        runInterestScoring();
      } catch (err) {
        grid.innerHTML = `<div class="adm-state error">Failed to load: ${err.message}</div>`;
      }
    }

    // Auto-load if already authenticated
    if (sessionStorage.getItem(SESSION_KEY) === '1') admLoad();
  </script>
</body>
</html>
